<!doctype html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://www.googletagmanager.com">
    <link rel="dns-prefetch" href="https://www.googletagmanager.com">

    <!-- Google tag (gtag.js) -->
    <script async src=""></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', '', { debug_mode: true });
    </script>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pick Our Date</title>

    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.0.3/tsparticles.confetti.bundle.min.js"></script>

    <style>
        body {
            margin: 0;
            display: grid;
            place-items: center;
            height: 100vh;
            background: radial-gradient(circle at 20% 30%, #fbcfe8, #a78bfa);
            font-family: 'Poppins', Calibri, sans-serif;
            color: #000;
        }

        .card {
            background: #fff;
            padding: 2rem 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px #0002;
            max-width: 720px;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0;
            color: #be29ec;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.6;
            margin: 1rem 0;
        }

        .pill {
            display: inline-block;
            margin: .4rem;
            padding: .6rem 1rem;
            border-radius: 999px;
            background: #ede9fe;
            color: #800080;
            font-weight: 600;
            cursor: pointer;
            border: 0;
        }

        .btn {
            display: inline-block;
            margin-top: 1rem;
            padding: .8rem 1.4rem;
            border-radius: .8rem;
            background: linear-gradient(45deg, #efbbff, #660066);
            color: #fff;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: transform .2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        #options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: .5rem;
        }

        .pill:focus-visible,
        .btn:focus-visible {
            outline: 3px solid #7c3aed;
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>Pick Our Saturday Date</h1>
        <p>Choose what sounds the most fun:</p>

        <div id="options">
            <button type="button" class="pill"
                data-id="wilson-moonhouse"
                data-label="Wilson Park pickleball + Moonhouse sushi"
                aria-pressed="false">
                Wilson Park Pickleball → Moonhouse (Sushi)
            </button>

            <button type="button" class="pill"
                data-id="minigolf-renzos"
                data-label="mini golf + Renzo’s pasta dinner"
                aria-pressed="false">
                Mini Golf → Renzo’s Pasta & Italian Steakhouse
            </button>

            <button type="button" class="pill"
                data-id="ham-boulders"
                data-label="Hammontree’s grilled cheese + Boulders & Brews"
                aria-pressed="false">
                Hammontree’s Grilled Cheese → Boulders & Brews (Bouldering)
            </button>

            <button type="button" class="pill"
                data-id="bowling-bocca"
                data-label="bowling + Bocca Italian"
                aria-pressed="false">
                Bowling → Bocca Italian Eatery & Pizzeria
            </button>

            <button type="button" class="pill"
                data-id="vetro-walk-dessert"
                data-label="Vetro 1925 dinner + night walk + dessert"
                aria-pressed="false">
                Vetro 1925 → Night Walk & Dessert
            </button>
        </div>

        <p style="margin-top:1rem">When you're ready:</p>
        <button type="button" class="btn" id="submitChoices">Lock It In</button>
        <p id="status" aria-live="polite" style="min-height:1.2rem;margin-top:.75rem;"></p>
    </main>

    <script>
        const pillOnStyle = el => {
            el.style.background = '#dcd4ff';
            el.style.outline = '2px solid #660066';
        };
        const pillOffStyle = el => {
            el.style.background = '#ede9fe';
            el.style.outline = 'none';
        };

        document.querySelectorAll('#options .pill').forEach(pill => {
            pillOffStyle(pill);
            pill.addEventListener('click', () => {
                const isOn = pill.getAttribute('aria-pressed') === 'true';
                const newState = !isOn;
                pill.setAttribute('aria-pressed', String(newState));
                newState ? pillOnStyle(pill) : pillOffStyle(pill);

                gtag('event', 'option_toggle', {
                    group: 'date_ideas',
                    option_id: pill.dataset.id,
                    option_label: pill.dataset.label,
                    state: String(newState),
                    debug_mode: true
                });
            });
        });

        const submitBtn = document.getElementById('submitChoices');
        submitBtn.addEventListener('click', () => {
            const selectedOptions = [...document.querySelectorAll('#options .pill[aria-pressed="true"]')]
                .map(b => ({ id: b.dataset.id, label: b.dataset.label }));

            if (selectedOptions.length === 0) {
                document.getElementById('status').textContent = 'Pick at least one date idea :)';
                return;
            }

            if (submitBtn.disabled) return;
            submitBtn.disabled = true;

            try {
                if (typeof confetti === 'function') {
                    confetti({ particleCount: 160, spread: 70, origin: { y: 0.6 } });
                }

                gtag('event', 'submit_preferences', {
                    group: 'date_ideas',
                    option_count: selectedOptions.length,
                    option_list: selectedOptions.map(s => s.id).join('|'),
                    debug_mode: true
                });

                document.getElementById('status').textContent =
                    'Saturday it is! Let’s do ' +
                    selectedOptions.map(s => s.label).join(', ') +
                    ' :)';
            } finally {
                setTimeout(() => { submitBtn.disabled = false; }, 800);
            }
        });
    </script>
</body>

</html>
